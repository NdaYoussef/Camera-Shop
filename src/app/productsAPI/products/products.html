<section class="py-5 bg-light min-vh-100">
  <div class="container">

    <!-- Header -->
    <div class="text-center mb-5">
      <h1 class="fw-bold display-5 text-dark">Our Products</h1>
      <p class="text-muted fs-5">Explore our curated collection</p>
    </div>

    
    <!-- Error State -->
    @if (error ) {
      <div class="alert alert-danger d-flex align-items-center justify-content-between" role="alert">
        <span>{{ error }}</span>
        <button class="btn btn-outline-danger btn-sm ms-3" (click)="fetchProducts()">
          Retry
        </button>
      </div>
    }

    <!-- Products Grid -->
    @if (!error) {
      <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-xl-4 g-4">
        @for (product of products; track product.id) {
          <div class="col">
            <div class="card h-100 shadow-sm border-0 product-card">

              <!-- Image -->
              <div class="position-relative overflow-hidden product-img-wrapper">
                <img
                  [src]="product.images[0]"
                  [alt]="product.title"
                  class="card-img-top product-img"
                
                />
                <!-- Category Badge -->
                <span class="badge bg-primary position-absolute top-0 start-0 m-2 px-2 py-1">
                  {{ product.category.name }}
                </span>
              </div>

              <!-- Card Body -->
              <div class="card-body d-flex flex-column gap-2">
                <h5 class="card-title fw-semibold text-dark mb-0 product-title">
                  {{ product.title }}
                </h5>
                <p class="card-text text-muted small product-desc flex-grow-1">
                  {{ product.description }}
                </p>

                <!-- Footer -->
                <div class="d-flex align-items-center justify-content-between mt-2">
                  <span class="fs-5 fw-bold text-primary">
                    ${{ product.price | number: '1.2-2' }}
                  </span>
                  <button class="btn btn-primary btn-sm px-3">
                    Add to Cart
                  </button>
                </div>
              </div>

            </div>
          </div>
        }
      </div>
    }

  </div>
</section>
