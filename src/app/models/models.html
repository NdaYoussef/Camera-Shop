<!-- products.component.html -->
<section class="po-products">

  <!-- ── Header bar ── -->
  <div class="po-products__bar">
    <p class="po-products__title">ALPHA SERIES BODY HIERARCHY</p>
    <div class="po-products__filters">
      @for (f of filters; track f) {
        <button
          class="po-filter-btn"
          [class.po-filter-btn--active]="activeFilter === f"
          (click)="setFilter(f)">
          {{ f }}
        </button>
      }
    </div>
  </div>

  <!-- ── Product grid ── -->
  <div class="po-products__grid">
    @for (p of filteredProducts; track p.id) {
      <div class="po-card">

        <!-- Image -->
        <div class="po-card__img-wrap">
          @if (p.badge) {
            <span class="po-card__badge">{{ p.badge }}</span>
          }
          <img [src]="p.img" [alt]="p.name" class="po-card__img" />
        </div>

        <!-- Body -->
        <div class="po-card__body">
          <h3 class="po-card__name">{{ p.name }}</h3>

          <div class="po-card__specs">
            @for (spec of p.specs; track spec.label) {
              <div class="po-card__spec-row">
                <span class="po-card__spec-label">{{ spec.label }}</span>
                <span class="po-card__spec-value">{{ spec.value }}</span>
              </div>
            }
          </div>

          <div class="po-card__footer">
            <span class="po-card__price">${{ p.price }}</span>
            <button
              class="po-card__cart-btn"
              (click)="addToCart(p)"
              [disabled]="p.quantity === 0"
              aria-label="Add to cart">
              <i class="fa-solid fa-cart-shopping"></i>
            </button>
          </div>
        </div>

      </div>
    }
  </div>

</section>
