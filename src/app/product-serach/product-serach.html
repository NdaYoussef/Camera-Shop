<!-- parent.html -->
<div class="search-filter-bar d-flex align-items-center justify-content-between px-4 py-3 mt-4 mb-4 w-100">
  <div class="search-wrapper d-flex align-items-center w-50 m-auto">
    <i class="fa-solid fa-magnifying-glass search-icon"></i>
    <input
      type="text"
      class="search-input border-0 outline-none bg-transparent"
      placeholder="Search for handmade magic..."
      [(ngModel)]="query"
    />
  </div>
</div>

<app-products [searchQuery]="query"></app-products>
